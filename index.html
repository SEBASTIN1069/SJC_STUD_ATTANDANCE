    <!DOCTYPE html>
    <html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

    body{
    font-family: 'Poppins', sans-serif;
}
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: sans-serif;
    }

    /* ===== NEW LOGIN DESIGN ===== */
    body{
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: url('./bg.jpg');
    background-size: cover;
    background-position: center;

    transition: all 0.4s ease;
    }
    body{
    overflow-x: hidden;
    }

    /* attendance mode override */
    body.attendanceMode{
        display:block;
        background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
        color:white;
    }

    /* LOGIN BOX */
    .login-form{
        background: rgba(64, 64, 64, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 30px;
        border-radius: 16px;
        backdrop-filter: blur(25px);
        text-align: center;
        color: white;
        width: 400px;
        box-shadow: 0 0 20px 10px rgba(0, 0, 0, 0.15);
    }

    .login-title{
        font-size: 40px;
        margin-bottom: 40px;
    }

    .input-box{
        margin: 20px 0;
        position: relative;
    }

    .input-box input{
        width: 100%;
        background: rgba(255, 255, 255, 0.3);
        border: none;
        padding: 12px 12px 12px 45px;
        border-radius: 99px;
        outline: 3px solid transparent;
        transition: 0.3s;
        font-size: 17px;
        color: wheat;
        font-weight: 600;
    }

    .input-box input::placeholder{
        color: rgba(255, 255, 255, 0.8);
    }

    .input-box input:focus{
        outline: 3px solid rgba(255, 255, 255, 0.3);
    }

    .login-btn{
        width: 100%;
        padding: 10px 0;
        background: #2f9cf4;
        border: none;
        border-radius: 99px;
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }

    .login-btn:hover{
    background: #0b87ec;
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(47,156,244,0.6);
    }

    .input-box i{
        position:absolute;
        left:15px;
        top:50%;
        transform:translateY(-50%);
        color:white;
    }

    .input-box{
        position:relative;
    }


    #attendancePage header{text-align:center;padding:15px;background:rgba(0,0,0,0.3);}
    .controls{display:flex;justify-content:center;align-items:center;gap:15px;margin:20px;flex-wrap:wrap;}
    label{font-weight:bold;}
    select,input{padding:8px;border-radius:5px;border:none;}
    .classSelect{padding:8px;border-radius:5px;border:none;background:white;font-weight:bold;cursor:pointer;}
    .dashboard{
    max-width:1100px;
    margin:20px auto;
    padding:20px;
    border-radius:16px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);

    color:white;
    overflow-x:auto;
    }
    .grid-table{width:100%;border-collapse:collapse;}
    .grid-table th,
    .grid-table td{
    padding:10px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.2);
    }

    .grid-table th{
    background: rgba(0,0,0,0.3);
    color:white;
    font-weight:600;
    }
    .box{
    cursor:pointer;
    font-weight:bold;
    transition:0.2s ease;
    }

    .box:hover{
    transform: scale(1.1);
    }
    .present{color:rgb(255, 255, 255);}
    .absent{color:red;}
    .locked{background:#5e52e7;pointer-events:none;}
    .summaryBtn{display:block;width:90px;margin:5px auto;padding:6px;border-radius:8px;color:white;font-weight:bold;cursor:pointer;}
    .grey{background:#6c757d;}
    .blue{background:#0275d8;}
    .purple{background:#6f42c1;}
    .greenBtn{background:#28a745;}
    .absBox{border:1px solid #999;min-height:60px;max-height:100px;overflow-y:auto;font-size:12px;margin-top:4px;padding:3px;background:#3948c7;}
    .finalSubmit{background:yellow;padding:8px 20px;font-weight:bold;border:none;border-radius:6px;cursor:pointer;}
    #successBox{display:none;text-align:center;margin-top:10px;}
    #coin{font-size:40px;display:inline-block;transition: transform 1s ease;}
    .spin{animation: spin 1s linear;}
    @keyframes spin{0%{transform:rotateY(0deg);}100%{transform:rotateY(360deg);}}

    body.attendanceMode{
    background:linear-gradient(to right,#352097,#3948c7,#248df8);
    color:white;
    }
    /* ===== MOBILE RESPONSIVE FIX ===== */
    @media only screen and (max-width: 768px){

    .dashboard{
        padding: 10px;
        overflow-x: auto; /* 🔥 scroll enable */
    }

    .grid-table{
        min-width: 700px;  /* force scroll */
        font-size: 12px;
    }

    header h2{
        font-size: 18px;
    }

    header h3{
        font-size: 14px;
    }

    .controls{
        flex-direction: column;
        gap: 10px;
    }

    select, input{
        width: 100%;
        font-size: 14px;
    }

    .summaryBtn{
        width: 70px;
        font-size: 11px;
        padding: 4px;
    }

    .finalSubmit{
        width: 100%;
        font-size: 14px;
    }

    .box{
        font-size: 12px;
        padding: 4px;
    }
}
    </style>
    </head>

    <body>

    <!-- LOGIN PAGE -->
    <div id="loginPage">
        <form class="login-form" onsubmit="login(event)">
            <h1 class="login-title">Login</h1>

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Username">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password">
            </div>

        

            <button class="login-btn" type="submit">Login</button>

        </form>
    </div>


    <!-- ATTENDANCE PAGE (UNCHANGED STRUCTURE) -->
    <div id="attendancePage" style="display:none; width:100%;">

    <header>
    <h2>St. Joseph's College (Autonomous)</h2>
    <h3>Department of Computer Science</h3>

    <div style="margin-top:10px;">
        Welcome: <b id="userDisplay"></b>

        <button onclick="logout()" 
        style="margin-left:15px;padding:5px 10px;border:none;border-radius:5px;cursor:pointer;">
            Logout
        </button>
    </div>

    </header>

    <div class="controls">
    <label>Date:</label>
    <input type="date" id="attendanceDate">

    <label>CLASS:</label>
    <select id="classSelect" class="classSelect" onchange="classChanged()">
    <option value="A">I BSC CS 'A'</option>
    <option value="B">I BSC CS 'B'</option>
    <option value="C">I BSC CS 'C'</option>
    <option value="D">I BSC CS 'D'</option>
    </select>

    <select id="dayOrder" onchange="updateDayOrder()">
    <option value="">Choose Day Order</option>
    <option value="A">A Day</option>
    <option value="B">B Day</option>
    <option value="C">C Day</option>
    <option value="D">D Day</option>
    <option value="E">E Day</option>
    <option value="F">F Day</option>
    </select>

    <button class="finalSubmit" onclick="finalSubmit()">FINAL SUBMIT</button>
    </div>

    <div id="successBox">
    <span id="coin">🪙</span>
    <div><b>SUBMITTED SUCCESSFULLY</b></div>
    </div>

    <div class="dashboard">
    <table class="grid-table">
    <thead>
    <tr>
    <th>D.No.</th>
    <th id="h1">H1</th>
    <th id="h2">H2</th>
    <th id="h3">H3</th>
    <th id="h4">H4</th>
    <th id="h5">H5</th>
    </tr>
    </thead>
    <tbody id="attendanceGrid"></tbody>
    </table>
    </div>

    </div>

    <script>

    /* LOGIN SYSTEM */
    function login(event){
        event.preventDefault();

        let u = document.getElementById("username").value;
        let p = document.getElementById("password").value;

        const users = {
            "25UCSA": {password:"admin@321", class:"A"},
            "25UCSB": {password:"admin@321", class:"B"},
            "25UCSC": {password:"admin@321", class:"C"},
            "25UCSD": {password:"admin@321", class:"D"}
        };

        if(users[u] && users[u].password === p){

            sessionStorage.setItem("currentUser", u);

            document.getElementById("loginPage").style.display="none";
            document.getElementById("attendancePage").style.display="block";
            document.body.classList.add("attendanceMode");

            selectedClass = users[u].class;
            document.getElementById("classSelect").value = selectedClass;

            generateStudents();
            generateGrid();
            updateDayOrder();

            document.getElementById("userDisplay").innerText = u;

            document.getElementById("classSelect").disabled = true;

        }else{
            alert("Wrong Username or Password");
        }
    }


    /* ===== ATTENDANCE SCRIPT (UNCHANGED) ===== */

    const classStudents = {
    "A": { start: 501, end: 565 },
    "B": { start: 601, end: 662 },
    "C": { start: 701, end: 760 },
    "D": { start: 801, end: 860 }
    };

    let students=[];
    let selectedClass="A";
    let tempData={}, originalData={}, lockedColumns={}, colState={};

    function generateStudents(){
    students=[];
    let range=classStudents[selectedClass];
    for(let i=range.start;i<=range.end;i++){
    students.push("25UCS"+i);
    }
    }

    function generateGrid(){
    attendanceGrid.innerHTML="";
    tempData={}; originalData={}; lockedColumns={}; colState={};

    students.forEach(student=>{
    let row="<tr><td>"+student+"</td>";
    tempData[student]=["P","P","P","P","P"];
    originalData[student]=["P","P","P","P","P"];
    for(let i=0;i<5;i++){
    row+=`<td class="box present" data-col="${i}" onclick="toggleAttendance('${student}',${i},this)">P</td>`;
    }
    row+="</tr>";
    attendanceGrid.innerHTML+=row;
    });

    let summaryRow="<tr><td><b>Summary</b></td>";
    for(let i=0;i<5;i++){
    lockedColumns[i]=false;
    colState[i]={free:false,eng:false};
    summaryRow+=`
    <td>
    <div>Abs (<span id="absCount${i}">0</span>)</div>
    <div id="absList${i}" class="absBox"></div>
    <div class="summaryBtn grey" onclick="toggleFree(${i})">Free</div>
    <div class="summaryBtn greenBtn" onclick="lockColumn(${i})">Submit</div>
    <div class="summaryBtn blue" onclick="unlockColumn(${i})">Edit</div>
    </td>`;
    }
    summaryRow+="</tr>";
    attendanceGrid.innerHTML+=summaryRow;
    }

    function updateDayOrder(){

let day = document.getElementById("dayOrder").value;

// reset H1–H5 labels
for(let i=1;i<=5;i++){
document.getElementById("h"+i).innerText="H"+i;
}

// helper function
function set(h1,h2,h3,h4,h5){
h1El.innerText="H1 - "+h1;
h2El.innerText="H2 - "+h2;
h3El.innerText="H3 - "+h3;
h4El.innerText="H4 - "+h4;
h5El.innerText="H5 - "+h5;
}

/* ---------------- CLASS A ---------------- */
if(selectedClass==="A"){
if(day==="A") set("DSA","HE","TAM","ENG","MAT");
if(day==="B") set("LAB","LAB","LAB","TAM","ENG");
if(day==="C") set("ENG","PYT","MAT","PYT","DSA");
if(day==="D") set("MAT","TAM","EVS","MAT","DSA");
if(day==="E") set("PYT","DSA","MAT","TAM","ENG");
if(day==="F") set("PYT","HE","EVS","ENG","MAT");
}

/* ---------------- CLASS B ---------------- */
if(selectedClass==="B"){
if(day==="A") set("PYT","HE","TAM","ENG","MAT");
if(day==="B") set("DSA","MAT","PYT","TAM","ENG");
if(day==="C") set("ENG","DSA","PYT","MAT","DSA");
if(day==="D") set("DSA","MAT","EVS","MAT","PYT");
if(day==="E") set("LAB","LAB","LAB","TAM","ENG");
if(day==="F") set("TAM","HE","MAT","ENG","EVS");
}

/* ---------------- CLASS C ---------------- */
if(selectedClass==="C"){
if(day==="A") set("PYT","DSA","MAT","ENG","HE");
if(day==="B") set("MAT","TAM","DSA","ENG","PYT");
if(day==="C") set("ENG","PYT","MAT","DSA","TAM");
if(day==="D") set("HE","MAT","ENG","PYT","DSA");
if(day==="E") set("DSA","ENG","TAM","MAT","PYT");
if(day==="F") set("PYT","HE","ENG","MAT","DSA");
}

/* ---------------- CLASS D ---------------- */
if(selectedClass==="D"){
if(day==="A") set("PYT","HE","TAM","ENG","MAT");
if(day==="B") set("LAB","LAB","LAB","DSA","ENG");
if(day==="C") set("ENG","TAM","DSA","DSA","MAT");
if(day==="D") set("PYT","MAT","EVS","TAM","MAT");
if(day==="E") set("DSA","MAT","PYT","TAM","ENG");
if(day==="F") set("PYT","HE","MAT","ENG","EVS");
}

}
    function setHeaders(h1,h2,h3,h4,h5){
    h1El.innerText="H1 - "+h1;
    h2El.innerText="H2 - "+h2;
    h3El.innerText="H3 - "+h3;
    h4El.innerText="H4 - "+h4;
    h5El.innerText="H5 - "+h5;
    }

    const h1El=document.getElementById("h1");
    const h2El=document.getElementById("h2");
    const h3El=document.getElementById("h3");
    const h4El=document.getElementById("h4");
    const h5El=document.getElementById("h5");

    function toggleAttendance(student,index,cell){
    if(lockedColumns[index]) return;
    if(cell.innerText==="P"){
    cell.innerText="A";
    cell.className="box absent";
    tempData[student][index]="A";
    }else{
    cell.innerText="P";
    cell.className="box present";
    tempData[student][index]="P";
    }
    updateAbsList(index);

    saveAttendance();
    }

    function updateAbsList(col){
    let absList=document.getElementById("absList"+col);
    let absCount=document.getElementById("absCount"+col);
    absList.innerHTML="";
    let count=0;
    students.forEach(student=>{
    if(tempData[student][col]==="A"){
    count++;
    absList.innerHTML+=student+"<br>";
    }
    });
    absCount.innerText=count;
    }

    function toggleFree(col){
    colState[col].free=!colState[col].free;
    let cells=document.querySelectorAll(`td[data-col='${col}']`);
    cells.forEach(cell=>{
    cell.innerText=colState[col].free?"-":"P";
    });
    updateAbsList(col);
    }

    function toggleENG(col){
    colState[col].eng=!colState[col].eng;
    let cells=document.querySelectorAll(`td[data-col='${col}']`);
    cells.forEach(cell=>{
    cell.innerText=colState[col].eng?"ENG":"P";
    });
    updateAbsList(col);
    }

    function lockColumn(col){
    lockedColumns[col]=true;
    document.querySelectorAll(`td[data-col='${col}']`)
    .forEach(cell=>cell.classList.add("locked"));
    }

    function unlockColumn(col){
    lockedColumns[col]=false;
    document.querySelectorAll(`td[data-col='${col}']`)
    .forEach(cell=>cell.classList.remove("locked"));
    }

    function classChanged(){
    selectedClass=document.getElementById("classSelect").value;
    generateStudents();
    generateGrid();
    updateDayOrder();
    }

    function finalSubmit(){
    let date=document.getElementById("attendanceDate").value;
    if(!date){ alert("Select Date"); return; }
    document.getElementById("successBox").style.display="block";
    let coin=document.getElementById("coin");
    coin.classList.add("spin");
    setTimeout(()=>{
    coin.classList.remove("spin");
    coin.textContent="✅";
    },1000);
    }

    generateStudents();
    generateGrid();

    function logout(){
        sessionStorage.clear();

        document.getElementById("attendancePage").style.display="none";
        document.getElementById("loginPage").style.display="block";

        document.body.classList.remove("attendanceMode");

        document.getElementById("username").value="";
        document.getElementById("password").value="";

        document.getElementById("classSelect").disabled = false;
    }
    function saveAttendance(){

        let date = document.getElementById("attendanceDate").value;

        if(!date) return;

        let key = selectedClass + "_" + date;

         localStorage.setItem(key, JSON.stringify(tempData));

    }
    function loadAttendance(){

        let date = document.getElementById("attendanceDate").value;

        if(!date) return;
 
        let key = selectedClass + "_" + date;

        let data = localStorage.getItem(key);

        if(!data) return;

        tempData = JSON.parse(data);

     // 🔥 UI update
        students.forEach(student=>{
        for(let i=0;i<5;i++){

        let cells = document.querySelectorAll(`td[data-col='${i}']`);

        cells.forEach(cell=>{
        let row = cell.parentElement.firstChild.innerText;

        if(tempData[row]){

        if(tempData[row][i]==="A"){
        cell.innerText="A";
        cell.className="box absent";
    }else{
        cell.innerText="P";
        cell.className="box present";
    }

    }
      });

    }
      });

}

    </script>

    </body>
    </html>
