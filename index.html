    <!DOCTYPE html>
    <html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
    body{
       font-family: 'Poppins', sans-serif;
       min-height: 100vh;

       align-items: center;

       background-position: center;

}

    /* attendance mode override */
    body.attendanceMode{
        display:block;
        background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
        color:white;
    }

    /* LOGIN BOX */
    .login-form{
        background: rgba(64, 64, 64, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 30px;
        border-radius: 16px;

        text-align: center;
        color: white;

    .login-title{

    }

    .input-box{
        margin: 20px 0;

    }

    .input-box input{
        width: 100%;
        background: rgba(255, 255, 255, 0.3);
        border: none;

    .login-btn{

    .login-btn:hover{
    background: #0b87ec;

    .input-box i{
        position:absolute;

    .grid-table{width:100%;border-collapse:collapse;}
    .grid-table th,
    .grid-table td{
    padding:10px;

    }

    .grid-table th{

    }
    .box{
    cursor:pointer;
    font-weight:bold;
    transition:0.2s ease;
    }

    .box:hover{
    transform: scale(1.1);
    }
    .present{color:rgb(255, 255, 255);}
    .absent{color:red;}
    .locked{background:#5e52e7;pointer-events:none;}
    .summaryBtn{display:block;width:90px;margin:5px auto;padding:6px;border-radius:8px;color:white;font-weight:bold;cursor:pointer;}
    .grey{background:#6c757d;}
    .blue{background:#0275d8;}

    .absBox{border:1px solid #999;min-height:60px;max-height:100px;overflow-y:auto;font-size:12px;margin-top:4px;padding:3px;background:#3948c7;}

}

    <script>

let h1El, h2El, h3El, h4El, h5El;
window.onload = function() {
    h1El = document.getElementById("h1");
    h2El = document.getElementById("h2");
    h3El = document.getElementById("h3");
    h4El = document.getElementById("h4");
    h5El = document.getElementById("h5");
};
        

    /* LOGIN SYSTEM */
    function login(event){
        event.preventDefault();

        let u = document.getElementById("username").value;
        let p = document.getElementById("password").value;

        const users = {
            "25UCSA": {password:"admin@321", class:"A"},
            "25UCSB": {password:"admin@321", class:"B"},
            "25UCSC": {password:"admin@321", class:"C"},
            "25UCSD": {password:"admin@321", class:"D"}
        };

        if(users[u] && users[u].password === p){

            sessionStorage.setItem("currentUser", u);

            document.getElementById("loginPage").style.display="none";
            document.getElementById("attendancePage").style.display="block";
            document.body.classList.add("attendanceMode");

            selectedClass = users[u].class;
            document.getElementById("classSelect").value = selectedClass;

            generateStudents();
            generateGrid();
            loadAttendance();
           

            document.getElementById("userDisplay").innerText = u;

            document.getElementById("classSelect").disabled = true;

        }else{
            alert("Wrong Username or Password");
        }
    }


    /* ===== ATTENDANCE SCRIPT (UNCHANGED) ===== */

    const classStudents = {
    "A": { start: 501, end: 565 },
    "B": { start: 601, end: 662 },
    "C": { start: 701, end: 760 },
    "D": { start: 801, end: 860 }
    };

    let students=[];
    let selectedClass="A";
    let tempData = {};
    let originalData = {};
    let colState = {};

    let lockedColumns = [false, false, false, false, false];
    let freeColumns = [false, false, false, false, false];

    function generateStudents(){
    students=[];
    let range=classStudents[selectedClass];
    for(let i=range.start;i<=range.end;i++){
    students.push("25UCS"+i);
    }
    }
function generateGrid(){

    let container = document.getElementById("studentContainer");
    container.innerHTML = "";

    students.forEach((student, index) => {

        let row = document.createElement("div");
        row.className = "student-row";

        row.innerHTML = `
    <div class="circle left">${index+1}</div>

    <div class="student-info">
        <div><b>D.No:</b> ${student}</div>
        <div><b>Name:</b> Student ${index+1}</div>
    </div>

    <div class="circle-group">
        <div class="circle right" onclick="toggleCircle(this)">P</div>
        <div class="circle right" onclick="toggleCircle(this)">P</div>
        <div class="circle right" onclick="toggleCircle(this)">P</div>
        <div class="circle right" onclick="toggleCircle(this)">P</div>
        <div class="circle right" onclick="toggleCircle(this)">P</div>
    </div>
`;
            

        container.appendChild(row);
    });
}
function toggleCircle(el){

    let student = el.closest(".student-row")
                    .querySelector(".student-info div")
                    .innerText.split(": ")[1];

    let index = Array.from(el.parentElement.children).indexOf(el);

    if(freeColumns[index]) return;

    if(lockedColumns[index]) return;

    if(!tempData[student]){
        tempData[student] = ["P","P","P","P","P"];
    }

    if(el.innerText === "P"){
        el.innerText = "A";
        el.style.background = "red";
        tempData[student][index] = "A";
    }else{
        el.innerText = "P";
        el.style.background = "#2b0dbb";
        tempData[student][index] = "P";
    }

    saveAttendance(); // 🔥 auto save
    updateAbsentees();
}

    function updateDayOrder(){

let day = document.getElementById("dayOrder").value;

// reset H1–H5 labels
for(let i=1;i<=5;i++){
document.getElementById("h"+i).innerText="H"+i;
}

// helper function
function set(h1,h2,h3,h4,h5){
h1El.innerText="H1 - "+h1;
h2El.innerText="H2 - "+h2;
h3El.innerText="H3 - "+h3;
h4El.innerText="H4 - "+h4;
h5El.innerText="H5 - "+h5;
}

/* ---------------- CLASS A ---------------- */
if(selectedClass==="A"){
if(day==="A") set("DSA","HE","TAM","ENG","MAT");
if(day==="B") set("LAB","LAB","LAB","TAM","ENG");
if(day==="C") set("ENG","PYT","MAT","PYT","DSA");
if(day==="D") set("MAT","TAM","EVS","MAT","DSA");
if(day==="E") set("PYT","DSA","MAT","TAM","ENG");
if(day==="F") set("PYT","HE","EVS","ENG","MAT");
}

/* ---------------- CLASS B ---------------- */
if(selectedClass==="B"){
if(day==="A") set("PYT","HE","TAM","ENG","MAT");
if(day==="B") set("DSA","MAT","PYT","TAM","ENG");
if(day==="C") set("ENG","DSA","PYT","MAT","DSA");
if(day==="D") set("DSA","MAT","EVS","MAT","PYT");
if(day==="E") set("LAB","LAB","LAB","TAM","ENG");
if(day==="F") set("TAM","HE","MAT","ENG","EVS");
}

/* ---------------- CLASS C ---------------- */
if(selectedClass==="C"){
if(day==="A") set("PYT","DSA","MAT","ENG","HE");
if(day==="B") set("MAT","TAM","DSA","ENG","PYT");
if(day==="C") set("ENG","PYT","MAT","DSA","TAM");
if(day==="D") set("HE","MAT","ENG","PYT","DSA");
if(day==="E") set("DSA","ENG","TAM","MAT","PYT");
if(day==="F") set("PYT","HE","ENG","MAT","DSA");
}

/* ---------------- CLASS D ---------------- */
if(selectedClass==="D"){
if(day==="A") set("PYT","HE","TAM","ENG","MAT");
if(day==="B") set("LAB","LAB","LAB","DSA","ENG");
if(day==="C") set("ENG","TAM","DSA","DSA","MAT");
if(day==="D") set("PYT","MAT","EVS","TAM","MAT");
if(day==="E") set("DSA","MAT","PYT","TAM","ENG");
if(day==="F") set("PYT","HE","MAT","ENG","EVS");
}

}

    function classChanged(){
    selectedClass=document.getElementById("classSelect").value;
     tempData = {};   // 🔥 reset
      freeColumns = [false,false,false,false,false];
      lockedColumns = [false,false,false,false,false];
    generateStudents();
    generateGrid();
    }

    function finalSubmit(){

    let date = document.getElementById("attendanceDate").value;
    if(!date){ 
        alert("Select Date"); 
        return; 
    }

    saveAttendance();

    document.getElementById("successBox").style.display="block";

    let coin = document.getElementById("coin");
    coin.classList.add("spin");

    // 👉 AFTER 1 second (coin animation), download
    setTimeout(()=>{
        coin.classList.remove("spin");
        coin.textContent="✅";

        exportToExcel(); // 🔥 DOWNLOAD HERE

    },1000);
}

    function logout(){
        sessionStorage.clear();

        document.getElementById("attendancePage").style.display="none";
        document.getElementById("loginPage").style.display="block";

        document.body.classList.remove("attendanceMode");

        document.getElementById("username").value="";
        document.getElementById("password").value="";

        document.getElementById("classSelect").disabled = false;
    }
    function saveAttendance(){

        let date = document.getElementById("attendanceDate").value;

        if(!date) return;

        let key = selectedClass + "_" + date;

         localStorage.setItem(key, JSON.stringify(tempData));

    }
    function loadAttendance(){

    let date = document.getElementById("attendanceDate").value;
    if(!date) return;

    let key = selectedClass + "_" + date;
    let data = localStorage.getItem(key);

    if(!data) return;

    tempData = JSON.parse(data);

    document.querySelectorAll(".student-row").forEach(row => {

        let student = row.querySelector(".student-info div")
                 .textContent.split(": ")[1]
                 .trim();
        let circles = row.querySelectorAll(".circle.right");

        if(tempData[student]){
            circles.forEach((circle, i) => {

                if(tempData[student][i] === "A"){
                      circle.innerText = "A";
                     circle.style.background = "red";

                }else if(tempData[student][i] === "-"){
                      circle.innerText = "-";
                      circle.style.background = "#f1c94a";

                }else{
                     circle.innerText = "P";
                     circle.style.background = "#2b0dbb";
                }
            });
        }

    });

}
/* ===== FREE + LOCK SYSTEM ===== */

function toggleFree(col){

    freeColumns[col] = !freeColumns[col];

    document.querySelectorAll(".student-row").forEach(row => {

        let student = row.querySelector(".student-info div")
                         .innerText.split(": ")[1];

        let circles = row.querySelectorAll(".circle.right");

        // if student not in tempData, create default
        if(!tempData[student]){
            tempData[student] = ["P","P","P","P","P"];
        }

        if(freeColumns[col]){
            // 👉 FREE ON
            circles[col].innerText = "-";
            circles[col].style.background = "#f1c94a";

            tempData[student][col] = "-";  // 🔥 IMPORTANT
        }else{
            // 👉 FREE OFF
            circles[col].innerText = "P";
            circles[col].style.background = "#2b0dbb";

            tempData[student][col] = "P";  // 🔥 IMPORTANT
        }

    });

    saveAttendance(); // 🔥 auto save pannum
    updateAbsentees();
}

function toggleLock(col){

    lockedColumns[col] = !lockedColumns[col];

    document.querySelectorAll(".student-row").forEach(row => {

        let circles = row.querySelectorAll(".circle.right");

        if(lockedColumns[col]){
            circles[col].style.pointerEvents = "none";
            circles[col].style.opacity = "0.5";
        }else{
            circles[col].style.pointerEvents = "auto";
            circles[col].style.opacity = "1";
        }

    });
}
function updateAbsentees(){

    let abs = [[],[],[],[],[]];

    document.querySelectorAll(".student-row").forEach(row => {

        let student = row.querySelector(".student-info div")
                         .innerText.split(": ")[1];

        let circles = row.querySelectorAll(".circle.right");

        circles.forEach((c, i) => {
            if(c.innerText === "A"){
                abs[i].push(student);
            }
        });

    });

    function formatAbs(list){
        return list.map(s => `<span style="color:red;font-weight:bold;">${s}</span>`).join("<br>");
    }

    document.getElementById("absH1").innerHTML = formatAbs(abs[0]);
    document.getElementById("absH2").innerHTML = formatAbs(abs[1]);
    document.getElementById("absH3").innerHTML = formatAbs(abs[2]);
    document.getElementById("absH4").innerHTML = formatAbs(abs[3]);
    document.getElementById("absH5").innerHTML = formatAbs(abs[4]);

    // ✅ COUNT
    document.getElementById("countH1").innerText = abs[0].length;
    document.getElementById("countH2").innerText = abs[1].length;
    document.getElementById("countH3").innerText = abs[2].length;
    document.getElementById("countH4").innerText = abs[3].length;
    document.getElementById("countH5").innerText = abs[4].length;
}
function exportToExcel(){

    let date = document.getElementById("attendanceDate").value;

    if(!date){
        alert("Select Date");
        return;
    }

    let subjects = [
        document.getElementById("h1").innerText,
        document.getElementById("h2").innerText,
        document.getElementById("h3").innerText,
        document.getElementById("h4").innerText,
        document.getElementById("h5").innerText
    ];

    let abs = [[],[],[],[],[]];

    students.forEach(student => {

        let data = tempData[student] || ["P","P","P","P","P"];

        data.forEach((val, i) => {
            if(val === "A"){
                abs[i].push(student);
            }
        });
    });

    let table = `<table border="1">`;

    // 🔷 TITLE
    table += `<tr>
        <th colspan="7" style="font-size:18px;">
        ABSENTEES REPORT - ${date}
        </th>
    </tr>`;

    table += `<tr></tr>`; // space

    // =========================
    // ✅ SECTION 1: HOUR-WISE ABSENTEES
    // =========================
    table += `<tr>
        <th>Hour</th>
        <th>Subject</th>
        <th>Absentees</th>
        <th>Total</th>
    </tr>`;

    abs.forEach((list, i) => {
        table += `<tr>
            <td>H${i+1}</td>
            <td>${subjects[i]}</td>
            <td>${list.join(", ")}</td>
            <td>${list.length}</td>
        </tr>`;
    });

    table += `<tr></tr><tr></tr>`; // gap

    // =========================
    // ✅ SECTION 2: STUDENT-WISE ABSENCE
    // =========================
    table += `<tr>
        <th>Student</th>
        <th colspan="5">Absent Hours</th>
        <th>Total</th>
    </tr>`;

    students.forEach(student => {

        let data = tempData[student] || ["P","P","P","P","P"];

        let absentHours = [];
        data.forEach((val, i) => {
            if(val === "A"){
                absentHours.push("H"+(i+1));
            }
        });

        if(absentHours.length > 0){
            table += `<tr>
                <td>${student}</td>
                <td colspan="5">${absentHours.join(", ")}</td>
                <td>${absentHours.length}</td>
            </tr>`;
        }
    });

    table += `<tr></tr><tr></tr>`; // gap

    // =========================
    // ✅ SECTION 3: TOTAL SUMMARY
    // =========================
    let totalAll = abs.reduce((sum, arr) => sum + arr.length, 0);

    table += `<tr>
        <th colspan="6">TOTAL ABSENTEES (ALL HOURS)</th>
        <th>${totalAll}</th>
    </tr>`;

    table += `</table>`;

    let blob = new Blob([table], {
        type: "application/vnd.ms-excel"
    });

    let a = document.createElement("a");

    let today = new Date().toISOString().split("T")[0];

    a.href = URL.createObjectURL(blob);
    a.download = today + ".xls";

    a.click();
}
      

    </script>

    </body>
    </html>
